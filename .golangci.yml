# FileGuard golangci-lint 配置
# 运行: golangci-lint run

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck      # 检查未处理的错误
    - gosimple      # 简化代码建议
    - govet         # Go 官方静态分析
    - ineffassign   # 检测无效赋值
    - staticcheck   # 高级静态分析
    - unused        # 检测未使用的代码
    - gofmt         # 格式化检查
    - goimports     # import 排序检查
    - misspell      # 拼写检查
    - nilerr        # nil error 返回检查

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/L1566/FileGuard
  misspell:
    locale: US

issues:
  exclude-dirs:
    - vendor
    - api/proto  # protobuf 自动生成代码
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*_grpc\\.pb\\.go$"
