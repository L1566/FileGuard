# FileGuard Kubernetes 部署示例
# 使用前请替换镜像地址和 Secret 中的敏感值
---
apiVersion: v1
kind: Namespace
metadata:
  name: fileguard
---
# ---- JWT 密钥（Secret） ----
apiVersion: v1
kind: Secret
metadata:
  name: fileguard-secrets
  namespace: fileguard
type: Opaque
stringData:
  jwt-secret-key: "your-256-bit-secret-key-change-in-production"
---
# ---- KMS 服务 ----
apiVersion: v1
kind: Service
metadata:
  name: kms
  namespace: fileguard
spec:
  selector:
    app: kms
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kms
  namespace: fileguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kms
  template:
    metadata:
      labels:
        app: kms
    spec:
      containers:
        - name: kms
          image: fileguard:latest
          command: ["kms", "-config", "/app/configs/kms.yaml"]
          ports:
            - containerPort: 50051
          volumeMounts:
            - name: config
              mountPath: /app/configs
            - name: kms-data
              mountPath: /app/data/kms
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: fileguard-config
        - name: kms-data
          persistentVolumeClaim:
            claimName: kms-data-pvc
---
# ---- 网关服务 ----
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: fileguard
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: fileguard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: fileguard:latest
          command: ["gateway", "-config", "/app/configs/gateway.yaml"]
          ports:
            - containerPort: 8080
          env:
            - name: FILEGUARD_KMS_ADDRESS
              value: "kms:50051"
            - name: FILEGUARD_JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fileguard-secrets
                  key: jwt-secret-key
          volumeMounts:
            - name: config
              mountPath: /app/configs
            - name: fonts
              mountPath: /app/fonts
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
      volumes:
        - name: config
          configMap:
            name: fileguard-config
        - name: fonts
          emptyDir: {}
---
# 配置（ConfigMap）
apiVersion: v1
kind: ConfigMap
metadata:
  name: fileguard-config
  namespace: fileguard
data:
  gateway.yaml: |
    service:
      name: FileGuard-gateway
      port: 8080
    jwt:
      # secret_key 通过环境变量 FILEGUARD_JWT_SECRET_KEY 注入（来自 Secret）
      issuer: "FileGuard"
      expiry: 24h
    log:
      level: info
      format: json
    storage:
      type: local
      root_dir: /app/data
    policy:
      rules_file: /app/configs/rules.json
    audit:
      log_file: /app/logs/audit.log
    kms:
      address: kms:50051
    dlp:
      rules_file: /app/configs/dlp_rules.json
    watermark:
      font_path: /app/fonts/1_Minecraft-Regular.otf
  kms.yaml: |
    service:
      name: FileGuard-kms
      port: 50051
    log:
      level: info
      format: json
    key_store:
      file: /app/data/kms/keys.json
---
# 持久化卷声明（KMS 密钥存储）
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kms-data-pvc
  namespace: fileguard
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
