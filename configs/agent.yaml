service:
  name: FileGuard-agent
  port: 8085

log:
  level: info
  format: text

client_id: "agent-001"

monitor:
  root_dir: ./data/monitor

gateway:
  url: http://localhost:8080
  heartbeat: 30s
  tls:
    enabled: false          # 启用以加密 Agent↔Gateway 通信
    ca_file: ./certs/ca.pem # CA 证书（自签名证书时需要）
