service:
  name: FileGuard-gateway
  port: 8080

jwt:
  secret_key: "your-256-bit-secret-key-change-in-production"
  issuer: "FileGuard"
  expiry: 24h

log:
  level: info   # debug, info, warn, error
  format: text  # text or json

storage:
  type: local
  root_dir: ./data  # 文件存储根目录

policy:
  rules_file: ./configs/rules.json

audit:
  log_file: ./logs/audit.log

kms:
  address: localhost:50051

dlp:
  rules_file: ./configs/dlp_rules.json

watermark:
  font_path: ./fonts/1_Minecraft-Regular.otf  # 水印字体文件路径