service:
  name: FileGuard-riskservice
  port: 8090

log:
  level: info
  format: text

llm:
  # 支持的提供商: anthropic | openai | deepseek | google | groq
  # deepseek/openai/groq 共用 OpenAI 兼容格式
  #provider: anthropic
  #model: claude-sonnet-4-6
  provider: deepseek
  model: deepseek-v4-pro
  api_key_env: FILEGUARD_LLM_API_KEY
  # endpoint: ""            # 可选：留空使用内置默认，填写则覆盖（如自托管代理）
  timeout: 10s
  max_retries: 2

cache:
  max_entries: 10000
  ttl: 5m
